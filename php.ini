; php.ini for Vercel deployment
; Upload settings
upload_max_filesize = 50M
post_max_size = 55M
max_execution_time = 60
max_input_time = 60
memory_limit = 256M

; Error reporting (set to 0 for production)
display_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Session
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_secure = 1

; Output
output_buffering = On
zlib.output_compression = On

; Extensions
extension=gd
extension=curl
extension=mbstring
extension=fileinfo
